<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptography Chat Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Cryptography Chat Demo</h1>
        
        <div class="mode-selector">
            <label>
                <input type="radio" name="mode" value="symmetric" checked> Symmetric (Caesar)
            </label>
            <label>
                <input type="radio" name="mode" value="asymmetric"> Asymmetric (Base64 Demo)
            </label>
        </div>
        
        <div id="symmetric-controls" class="controls">
            <label for="shift-key">Shift Key:</label>
            <input type="number" id="shift-key" value="3" min="1" max="25">
        </div>
        
        <div class="chat-container">
            <div id="chat-messages" class="messages"></div>
            <div class="input-container">
                <input type="text" id="message-input" placeholder="Type your message...">
                <button id="send-button">Send</button>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
