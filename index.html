<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptography Chat Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Cryptography Chat Demo</h1>
        <p class="subtitle">Simple dual-screen view for Symmetric and Asymmetric modes.</p>

        <div class="screens">
            <section class="screen-card">
                <h2>Symmetric Mode</h2>
                <div class="phone-shell">
                    <div class="chat-top">
                        <div class="top-left">
                            <span class="back-btn">&#8592;</span>
                            <div class="avatar">S</div>
                            <div class="profile-text">
                                <strong>Symmetric Room</strong>
                                <small>Online</small>
                            </div>
                        </div>
                    </div>

                    <div class="controls in-chat-controls">
                        <label for="shift-key">Shift</label>
                        <input type="number" id="shift-key" value="3" min="1" max="25">
                    </div>

                    <div class="chat-container">
                        <div id="symmetric-messages" class="messages"></div>
                        <div class="input-container">
                            <input type="text" id="symmetric-input" placeholder="Type message...">
                            <button id="symmetric-send">&#10148;</button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="screen-card">
                <h2>Asymmetric Mode</h2>
                <div class="phone-shell">
                    <div class="chat-top">
                        <div class="top-left">
                            <span class="back-btn">&#8592;</span>
                            <div class="avatar">A</div>
                            <div class="profile-text">
                                <strong>Asymmetric Room</strong>
                                <small>Online</small>
                            </div>
                        </div>
                    </div>

                    <div class="controls controls-muted in-chat-controls">
                        <span>Base64 encode/decode demo</span>
                    </div>

                    <div class="chat-container">
                        <div id="asymmetric-messages" class="messages"></div>
                        <div class="input-container">
                            <input type="text" id="asymmetric-input" placeholder="Type message...">
                            <button id="asymmetric-send">&#10148;</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
